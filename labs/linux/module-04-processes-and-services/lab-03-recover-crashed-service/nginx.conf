# Minimal nginx config for lab-03-recover-crashed-service
# Key settings:
#   daemon off  — keeps the master in the foreground so fake systemctl can track its PID
#   port 8080   — avoids needing CAP_NET_BIND_SERVICE (ports < 1024 require root bind cap)
#   pid /tmp/nginx.pid — writable by the intern user

daemon off;
worker_processes 1;
error_log /var/log/fakesystemd/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /var/log/fakesystemd/nginx-access.log;
    sendfile      on;

    server {
        listen 8080;
        server_name localhost;

        root  /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
